version: "3.8"

services:
  obsidian-mcp:
    build: .
    container_name: obsidian-mcp-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - VAULT_PATH=/vault
      - NODE_ENV=production
    volumes:
      - obsidian-vault:/vault
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.obsidian-mcp.rule=Host(`mcp.[DOMAIN]`)"
      - "traefik.http.routers.obsidian-mcp.entrypoints=websecure"
      - "traefik.http.routers.obsidian-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.obsidian-mcp.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  obsidian-vault:
    driver: local
